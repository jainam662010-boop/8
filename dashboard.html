<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Dashboard — Class 10Edu</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="nb"></div>
<div class="page-layout">
  <div id="sb"></div>
  <main class="main-area" id="mainArea">
    <div style="display:flex;align-items:center;justify-content:center;padding:80px 0"><div class="spinner"></div></div>
  </main>
</div>
<div class="page-watermark"></div>
<script src="js/app.js"></script>
<script src="js/security.js"></script>
<script src="js/theme_todo.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  // Check onboarding
  if (!App.hasProfile()) {
    App.applyMode();
    App.showOnboarding(() => location.reload());
    return;
  }

  App.initPage('dashboard');
  const data = await App.loadData();
  const p    = App.getProgress();
  const admData = App._parseLS('vm_admin_data', { announcements:[], pdfs:[], ncertTopics:[] });
  const profile = App.getProfile();

  // Compute stats
  let totalDone=0, totalQz=0, totalPct=0, lastSubj=null, lastCh=null, lastTs=0;
  data.subjects.forEach(s => {
    const sp = p[s.id] || {};
    totalDone += (sp.done||[]).length;
    Object.values(sp.scores||{}).forEach(sc => { totalQz++; totalPct += sc.pct; });
    if (sp.last && (sp.last.ts||0) > lastTs) { lastSubj=s; lastCh=sp.last; lastTs=sp.last.ts||0; }
  });
  const avgQ    = totalQz ? Math.round(totalPct/totalQz) : 0;
  const streak  = parseInt(localStorage.getItem('vm_streak')||'0');
  const anns    = (admData.announcements||[]).slice(0,3);
  const motd    = localStorage.getItem('vm_motd') || 'Every expert was once a beginner.';
  const greeting = getGreeting();

  const main = document.getElementById('mainArea');
  main.innerHTML = `
    <!-- Header -->
    <div class="page-head au">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px">
        <div>
          <div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-4);margin-bottom:4px">${greeting}</div>
          <h1 style="font-size:1.8rem;font-weight:800;letter-spacing:-.03em;color:var(--ink)">
            ${VidyaSec.sanitize(profile?.name || 'Student')} <span style="color:var(--accent)">👋</span>
          </h1>
          <div style="font-size:.86rem;color:var(--ink-3);margin-top:4px;font-style:italic">"${VidyaSec.sanitize(motd)}"</div>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-strip au-1">
      <div class="stat-card"><div class="stat-ico">📚</div><div><div class="stat-num">${data.subjects.length}</div><div class="stat-lbl">Subjects</div></div></div>
      <div class="stat-card"><div class="stat-ico">✅</div><div><div class="stat-num">${totalDone}</div><div class="stat-lbl">Completed</div></div></div>
      <div class="stat-card"><div class="stat-ico">🏆</div><div><div class="stat-num">${avgQ}%</div><div class="stat-lbl">Quiz Avg</div></div></div>
      <div class="stat-card"><div class="stat-ico">🔥</div><div><div class="stat-num">${streak}</div><div class="stat-lbl">Day Streak</div></div></div>
    </div>

    <!-- Continue Learning -->
    ${lastCh ? `
    <div class="continue-card au-1">
      <div class="cont-icon">${lastSubj?.icon||'📚'}</div>
      <div class="cont-info">
        <div class="cont-label">▶ Continue Learning</div>
        <div class="cont-title">${VidyaSec.sanitize(lastCh.title)}</div>
        <div class="cont-sub">${VidyaSec.sanitize(lastSubj?.name||'')} · Pick up where you left off</div>
      </div>
      <div class="cont-actions">
        <div class="streak-ring">
          <div style="text-align:center">
            <div class="streak-num">🔥${streak}</div>
            <div class="streak-lbl">streak</div>
          </div>
        </div>
        <a href="chapter.html?subject=${lastSubj?.id||''}&chapter=${lastCh.cid}" class="cont-btn solid">Resume →</a>
      </div>
    </div>` : ''}

    <!-- Quick Actions -->
    <div class="quick-row au-2">
      <a href="subject.html?id=mathematics"    class="quick-act" style="--qa-c:var(--math-c)"><div class="qa-icon">📐</div><div class="qa-label">Mathematics</div><div class="qa-sub">${(p.mathematics?.done||[]).length} chapters done</div></a>
      <a href="subject.html?id=science"        class="quick-act" style="--qa-c:var(--sci-c)"><div class="qa-icon">🔬</div><div class="qa-label">Science</div><div class="qa-sub">${(p.science?.done||[]).length} chapters done</div></a>
      <a href="subject.html?id=social-science" class="quick-act" style="--qa-c:var(--soc-c)"><div class="qa-icon">🌍</div><div class="qa-label">Social Science</div><div class="qa-sub">${(p['social-science']?.done||[]).length} chapters done</div></a>
      <a href="subject.html?id=english"        class="quick-act" style="--qa-c:var(--eng-c)"><div class="qa-icon">📚</div><div class="qa-label">English</div><div class="qa-sub">${(p.english?.done||[]).length} chapters done</div></a>
      <a href="todo.html"                      class="quick-act" style="--qa-c:var(--accent)"><div class="qa-icon">📋</div><div class="qa-label">My Tasks</div><div class="qa-sub">${TodoPanel.getData().filter(t=>!t.done).length} pending</div></a>
    </div>

    <!-- Announcements -->
    ${anns.length ? `
    <div class="card-3d au-2" style="margin-bottom:20px">
      <div class="card-accent-bar"></div>
      <div class="card-head"><h3>📢 Announcements</h3><span class="chip chip-b">${anns.length}</span></div>
      ${anns.map(a=>`<div style="display:flex;align-items:flex-start;gap:10px;padding:11px 18px;border-bottom:1px solid var(--border)">
        <span class="chip chip-${a.type==='exam'?'a':a.type==='info'?'tl':'b'}" style="flex-shrink:0;margin-top:1px">${a.type}</span>
        <div style="flex:1"><div style="font-size:.84rem;font-weight:700;margin-bottom:1px">${VidyaSec.sanitize(a.title)}</div><div style="font-size:.77rem;color:var(--ink-3)">${VidyaSec.sanitize(a.text)}</div></div>
        <div style="font-size:.68rem;color:var(--ink-5);flex-shrink:0">${a.date||''}</div>
      </div>`).join('')}
    </div>` : ''}

    <!-- AD: native, placed between stats and subjects — non-intrusive -->
    <div style="margin-bottom:20px" class="au-2">${App.adNative('dashboard')}</div>

    <!-- Subjects -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px" class="au-2">
      <div style="font-size:1rem;font-weight:700;color:var(--ink)">Your Subjects</div>
      <span class="chip chip-b">4 Core Subjects</span>
    </div>
    <div class="subjects-grid" id="subjGrid"></div>

    <!-- Recent tasks -->
    <div style="margin-top:28px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between" class="au-3">
      <div style="font-size:1rem;font-weight:700;color:var(--ink)">Recent Tasks</div>
      <a href="todo.html" class="btn btn-gh btn-sm">View All →</a>
    </div>
    <div id="todoPreview" style="max-width:680px"></div>`;

  // Subject cards — favourite first
  const sortedSubjs = [...data.subjects];
  if (profile?.favourite) {
    const fi = sortedSubjs.findIndex(s => s.id === profile.favourite);
    if (fi > 0) { const [f] = sortedSubjs.splice(fi,1); sortedSubjs.unshift(f); }
  }
  document.getElementById('subjGrid').innerHTML = sortedSubjs.map((s,i) => {
    const pct  = App.getSubjPct(s.id, s);
    const sp   = p[s.id] || {};
    const done = (sp.done||[]).length;
    return `<a href="subject.html?id=${s.id}" class="subj-card au" style="animation-delay:${i*60}ms;--sc-c:${s.color||'var(--accent)'};--sc-bg:${s.bg||'var(--accent-bg)'}">
      <div class="sc-blob"></div>
      <div class="sc-top"><div class="sc-em">${s.icon}</div><div class="sc-arrow">→</div></div>
      <div class="sc-name">${VidyaSec.sanitize(s.name)}</div>
      <div class="sc-hint">${VidyaSec.sanitize(s.description)}</div>
      <div class="sc-meta"><div class="sc-mi">📄 ${s.chapters.length} ch.</div><div class="sc-mi">✅ ${done} done</div></div>
      <div style="margin-bottom:11px">
        <div style="display:flex;justify-content:space-between;font-size:.69rem;color:var(--ink-4);margin-bottom:4px"><span>Progress</span><span>${pct}%</span></div>
        <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
      </div>
      <div class="sc-foot">
        <span style="font-size:.71rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:150px;color:var(--ink-4)">⏱ ${sp.last?.title||'Not started'}</span>
        <div class="sc-pill">${pct>0?'Continue →':'Start →'}</div>
      </div>
    </a>`;
  }).join('');

  // Recent todos
  const todos = TodoPanel.getData().slice(0,4);
  document.getElementById('todoPreview').innerHTML = todos.length
    ? `<div class="todo-items">${todos.map(t=>TodoPanel.itemHTML(t)).join('')}</div>`
    : `<div style="color:var(--ink-4);font-size:.84rem;padding:8px 0">No tasks yet. <a href="todo.html" style="color:var(--accent);font-weight:600">Add your first task →</a></div>`;
});

function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Good Morning';
  if (h < 17) return 'Good Afternoon';
  return 'Good Evening';
}
</script>
<script src="js/music.js"></script>
</body>
</html>
